name: 3PM Slack Connection Test

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  test_slack:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Alert
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "User": "Sreejoni <@U123456789>",
            "Task": "The 3PM alert test was successful!"
          }'
