name: Slack Last Day of Month Alert

on:
  schedule:
    - cron: '30 11 28-31 * *'
  workflow_dispatch:

jobs:
  check_and_trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Check if today is the last day of the month
        id: date_check
        run: |
          # If tomorrow's date is "01", then today is the last day
          TOMORROW_DAY=$(date -d "+1 day" +%d)
          if [ "$TOMORROW_DAY" = "01" ]; then
            echo "is_last_day=true" >> $GITHUB_OUTPUT
          else
            echo "is_last_day=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Alert
        if: steps.date_check.outputs.is_last_day == 'true'
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{"text": "Renew the names!"}'
