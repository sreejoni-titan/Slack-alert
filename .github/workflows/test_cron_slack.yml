name: Slack Penultimate Day Alert

on:
  schedule:
    - cron: '0 14 27-30 * *'
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Check if Day After Tomorrow is 1st
        run: |
          DAY_AFTER_TOMORROW=$(date -d "+2 days" +%d)
          if [ "$DAY_AFTER_TOMORROW" = "01" ]; then
            curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text": "⏳ PENULTIMATE ALERT: Tomorrow is the last day of the month!"}'
          fi
